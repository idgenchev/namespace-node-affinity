---
apiVersion: v1
kind: ConfigMap
metadata:
  name: namespace-node-affinity
  namespace: default
data:
  testing-ns: |
    nodeSelectorTerms:
      - matchExpressions:
        - key: the-testing-key
          operator: In
          values:
          - the-testing-val1
    tolerations:
      - key: "example-key"
        operator: "Exists"
        effect: "NoSchedule"
    excludedLabels:
      ignoreme: ignored
  testing-ns-b: |
    nodeSelectorTerms:
      - matchExpressions:
        - key: the-testing-key
          operator: In
          values:
          - the-testing-val1
  testing-ns-c: |
    tolerations:
      - key: "example-key"
        operator: "Exists"
        effect: "NoSchedule"
  testing-ns-d: |
    invalid:
      - key: "example-key"
        operator: "Exists"
        effect: "NoSchedule"
  testing-ns-preferred: |
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
          - key: spot
            operator: In
            values:
            - "true"
      - weight: 50
        preference:
          matchExpressions:
          - key: zone
            operator: In
            values:
            - us-west-2a
  testing-ns-combined: |
    nodeSelectorTerms:
      - matchExpressions:
        - key: dedicated
          operator: In
          values:
          - "true"
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
          - key: spot
            operator: In
            values:
            - "true"
    tolerations:
      - key: "spot"
        operator: "Exists"
        effect: "NoSchedule"
